name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'peer-backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        working-directory: peer-backend
        run: mvn package -DskipTests -q

      - name: Deploy to EC2
        env:
          EC2_KEY: ${{ secrets.EC2_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "$EC2_KEY" > key.pem
          chmod 400 key.pem

          # Upload JAR
          scp -i key.pem -o StrictHostKeyChecking=no \
            peer-backend/target/peer-backend-0.0.1-SNAPSHOT.jar \
            ec2-user@$EC2_HOST:/opt/peer/peer-backend.jar

          # Restart service
          ssh -i key.pem -o StrictHostKeyChecking=no ec2-user@$EC2_HOST \
            "sudo systemctl restart peer"

          rm -f key.pem
