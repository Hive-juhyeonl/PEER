spring:
  application:
    name: peer-backend

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:peer}
    username: ${DB_USERNAME:peer}
    password: ${DB_PASSWORD:peer}
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Google OAuth 2.0
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

# JWT
jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 1800000      # 30 minutes
  refresh-token-expiry: 604800000   # 7 days

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.peer: debug
    org.hibernate.SQL: debug

# App
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

# Server
server:
  port: ${SERVER_PORT:8080}
