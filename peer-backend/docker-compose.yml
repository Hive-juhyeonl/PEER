services:
  postgres:
    image: postgres:16-alpine
    container_name: peer-postgres
    environment:
      POSTGRES_DB: peer
      POSTGRES_USER: peer
      POSTGRES_PASSWORD: peer
    ports:
      - "5432:5432"
    volumes:
      - peer-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: peer-redis
    ports:
      - "6379:6379"
    volumes:
      - peer-redis-data:/data

volumes:
  peer-postgres-data:
  peer-redis-data:
